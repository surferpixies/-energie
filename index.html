<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#621B2D" />
  <title>Énergie & Repas</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div>
      <h1>Énergie & Repas</h1>
      <p>Ton suivi personnel, simple et rapide.</p>
    </div>
    <button id="installBtn" class="secondary hidden">Installer</button>
  </header>

  <main>
    <section class="card hero">
      <h2>Aujourd’hui</h2>
      <div class="stats">
        <div><strong id="todayMeals">0</strong><span>repas</span></div>
        <div><strong id="avgFatigue">—</strong><span>fatigue moy.</span></div>
        <div><strong id="sleepToday">—</strong><span>sommeil</span></div>
      </div>
      <button id="openForm" class="primary">＋ Ajouter un repas</button>
    </section>

    <section class="card">
      <h2>À compléter</h2>
      <div id="pendingList" class="empty">Aucun suivi en attente.</div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Derniers repas</h2>
        <button id="exportBtn" class="linkbtn">Exporter CSV</button>
      </div>
      <div id="mealList" class="empty">Aucun repas enregistré.</div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Tendances</h2>
        <button id="clearBtn" class="danger-link">Effacer les données</button>
      </div>
      <div id="trendList" class="empty">Ajoute quelques repas pour voir les tendances.</div>
    </section>
  </main>

  <dialog id="mealDialog">
    <form id="mealForm" method="dialog">
      <div class="dialog-head">
        <h2>Nouveau repas</h2>
        <button type="button" id="closeDialog" class="iconbtn">✕</button>
      </div>

      <label>Date et heure
        <input type="datetime-local" id="mealTime" required>
      </label>

      <label>Photo du repas
        <input type="file" id="mealPhoto" accept="image/*" capture="environment">
      </label>
      <img id="photoPreview" class="preview hidden" alt="Aperçu du repas">

      <label>Qu’as-tu mangé?
        <textarea id="mealText" rows="3" placeholder="Ex. bagel, fromage à la crème et café" required></textarea>
      </label>

      <label>Taille du repas
        <select id="mealSize">
          <option>Petit</option>
          <option selected>Moyen</option>
          <option>Gros</option>
        </select>
      </label>

      <label>Fatigue avant : <output id="beforeOut">5</output>/10
        <input type="range" id="fatigueBefore" min="0" max="10" value="5">
      </label>

      <label>Sommeil la nuit dernière (heures)
        <input type="number" id="sleepHours" min="0" max="24" step="0.25" placeholder="Ex. 7.5">
      </label>

      <label>Notes (optionnel)
        <textarea id="notes" rows="2" placeholder="Stress, entraînement, alcool, maladie..."></textarea>
      </label>

      <button class="primary" value="default">Enregistrer</button>
    </form>
  </dialog>

  <dialog id="followDialog">
    <form id="followForm" method="dialog">
      <div class="dialog-head">
        <h2>Compléter le suivi</h2>
        <button type="button" id="closeFollow" class="iconbtn">✕</button>
      </div>
      <p id="followMealName"></p>
      <input type="hidden" id="followId">

      <label>Fatigue 1 h après : <output id="after1Out">5</output>/10
        <input type="range" id="fatigueAfter1" min="0" max="10" value="5">
      </label>

      <label>Fatigue 3 h après : <output id="after3Out">5</output>/10
        <input type="range" id="fatigueAfter3" min="0" max="10" value="5">
      </label>

      <button class="primary" value="default">Sauvegarder</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
